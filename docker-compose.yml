services:
  postgres:
    image: postgres:17
    container_name: postgres-local
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  opensearch:
    image: opensearchproject/opensearch:2.19.4
    container_name: opensearch-local
    environment:
      - discovery.type=single-node
      - plugins.security.disabled=false
      - plugins.security.allow_unsafe_democertificates=true
      - plugins.security.allow_default_init_securityindex=true
      - plugins.security.authcz.admin_dn=CN=admin,OU=SSL,O=Test,L=Test,C=DE
      - OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m
      - OPENSEARCH_INITIAL_ADMIN_PASSWORD=${OPENSEARCH_PASSWORD}
    ulimits:
      memlock:
        soft: -1
        hard: -1
    ports:
      - "${OPENSEARCH_PORT}:9200"
    volumes:
      - opensearch-data:/usr/share/opensearch/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -sk https://localhost:9200 -u ${OPENSEARCH_USERNAME}:${OPENSEARCH_PASSWORD} | grep -q opensearch",
        ]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s

  backend:
    build: ./backend/vinyl-exchange
    container_name: vx-backend
    depends_on:
      postgres:
        condition: service_healthy
      opensearch:
        condition: service_healthy
    env_file: ./.env
    ports:
      - "${SERVER_PORT}:8080"
    volumes:
      - uploads-data:/app/uploads
    healthcheck:
      test:
        ["CMD-SHELL", "curl -f http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s

  frontend:
    build:
      context: ./frontend/vinyl-exchange
      args:
        VITE_API_URL: ${VITE_API_URL}
    container_name: vx-frontend
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "80:80"

volumes:
  opensearch-data:
  postgres-data:
  uploads-data:
